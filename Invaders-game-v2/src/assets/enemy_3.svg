<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="32" height="24" viewBox="0 0 32 24">
  <!-- Enemy Type 3 - Yellow alien ship -->
  <rect x="4" y="8" width="24" height="8" rx="4" fill="#ffff00" stroke="#cccc00" stroke-width="1"/>
  <!-- Wings -->
  <polygon points="2,12 6,10 6,14" fill="#ffff00"/>
  <polygon points="30,12 26,10 26,14" fill="#ffff00"/>
  <!-- Cockpit -->
  <rect x="12" y="10" width="8" height="4" rx="2" fill="#666600" opacity="0.8"/>
  <!-- Thrusters -->
  <circle cx="8" cy="12" r="1.5" fill="#ff6600">
    <animate attributeName="r" values="1.5;2;1.5" dur="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="24" cy="12" r="1.5" fill="#ff6600">
    <animate attributeName="r" values="1.5;2;1.5" dur="0.5s" repeatCount="indefinite"/>
  </circle>
</svg>