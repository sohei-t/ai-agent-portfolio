<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="32" height="24" viewBox="0 0 32 24">
  <!-- Enemy Type 2 - Purple alien ship -->
  <polygon points="16,2 4,20 28,20" fill="#ff00ff" stroke="#cc00cc" stroke-width="1"/>
  <!-- Cockpit -->
  <circle cx="16" cy="14" r="4" fill="#660066" opacity="0.8"/>
  <!-- Engine glow -->
  <circle cx="10" cy="18" r="2" fill="#ffff00">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="0.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="22" cy="18" r="2" fill="#ffff00">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="0.8s" repeatCount="indefinite"/>
  </circle>
</svg>