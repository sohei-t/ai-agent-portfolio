<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="32" height="24" viewBox="0 0 32 24">
  <!-- Enemy Type 1 - Green alien ship -->
  <ellipse cx="16" cy="12" rx="14" ry="10" fill="#00ff00" stroke="#00cc00" stroke-width="1"/>
  <!-- Cockpit window -->
  <ellipse cx="16" cy="10" rx="6" ry="4" fill="#004400" opacity="0.8"/>
  <!-- Weapon ports -->
  <circle cx="8" cy="14" r="2" fill="#ff0000">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="24" cy="14" r="2" fill="#ff0000">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1s" repeatCount="indefinite"/>
  </circle>
</svg>