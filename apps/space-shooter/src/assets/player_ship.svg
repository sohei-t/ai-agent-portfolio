<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="30" height="25" viewBox="0 0 30 25">
  <!-- Simple spaceship shape -->
  <polygon points="15,0 5,25 10,20 15,22 20,20 25,25" fill="#00ffff" stroke="#ffffff" stroke-width="1">
    <animate attributeName="opacity" values="1;0.8;1" dur="1s" repeatCount="indefinite"/>
  </polygon>
  <!-- Cockpit -->
  <circle cx="15" cy="10" r="3" fill="#ff00ff"/>
  <!-- Engine glow -->
  <ellipse cx="10" cy="23" rx="2" ry="4" fill="#ffff00" opacity="0.8">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="0.5s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="20" cy="23" rx="2" ry="4" fill="#ffff00" opacity="0.8">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="0.5s" repeatCount="indefinite"/>
  </ellipse>
</svg>