<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Task Gantt Chart Visualizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .gantt-container {
            padding: 30px;
            overflow-x: auto;
        }

        .gantt-chart {
            position: relative;
            min-height: 600px;
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
        }

        .time-axis {
            display: flex;
            border-bottom: 2px solid #dee2e6;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .time-unit {
            flex: 1;
            text-align: center;
            font-size: 0.9em;
            color: #6c757d;
        }

        .task-row {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            position: relative;
            min-height: 40px;
        }

        .task-label {
            width: 200px;
            padding-right: 20px;
            font-weight: 500;
            color: #495057;
        }

        .task-timeline {
            flex: 1;
            position: relative;
            height: 35px;
        }

        .task-bar {
            position: absolute;
            height: 100%;
            border-radius: 20px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            color: white;
            font-size: 0.85em;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .task-bar:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .task-bar.pending {
            background: linear-gradient(135deg, #ffd89b 0%, #19547b 100%);
        }

        .task-bar.running {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            animation: pulse 2s infinite;
        }

        .task-bar.completed {
            background: linear-gradient(135deg, #89f7fe 0%, #66a6ff 100%);
        }

        .task-bar.critical {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        .dependencies {
            position: absolute;
            top: 0;
            left: 200px;
            right: 0;
            bottom: 0;
            pointer-events: none;
        }

        .dependency-line {
            stroke: #e74c3c;
            stroke-width: 2;
            fill: none;
            stroke-dasharray: 5, 5;
            opacity: 0.5;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #dee2e6;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .legend-color {
            width: 30px;
            height: 20px;
            border-radius: 10px;
        }

        .progress-ring {
            width: 200px;
            height: 200px;
            margin: 30px auto;
        }

        .progress-ring circle {
            transition: stroke-dashoffset 0.35s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        .critical-path-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #e74c3c;
            color: white;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.8em;
        }

        .control-panel {
            padding: 20px 30px;
            background: #f8f9fa;
            border-top: 1px solid #dee2e6;
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .control-button {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .control-button:hover {
            transform: translateY(-2px);
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: white;
            border-radius: 25px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: blink 2s infinite;
        }

        .status-dot.active {
            background: #28a745;
        }

        .status-dot.paused {
            background: #ffc107;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Dynamic Task Orchestrator v4.0</h1>
            <div class="stats">
                <div class="stat">
                    <div class="stat-value" id="completedCount">0</div>
                    <div class="stat-label">完了</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="runningCount">0</div>
                    <div class="stat-label">実行中</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="pendingCount">11</div>
                    <div class="stat-label">待機中</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="progressPercent">0%</div>
                    <div class="stat-label">進捗率</div>
                </div>
            </div>
        </div>

        <div class="gantt-container">
            <div class="gantt-chart" id="ganttChart">
                <div class="time-axis" id="timeAxis">
                    <!-- 時間軸がここに動的生成 -->
                </div>
                <div id="taskRows">
                    <!-- タスク行がここに動的生成 -->
                </div>
                <svg class="dependencies" id="dependencies">
                    <!-- 依存関係線がここに描画 -->
                </svg>
            </div>

            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color" style="background: linear-gradient(135deg, #ffd89b 0%, #19547b 100%);"></div>
                    <span>待機中</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);"></div>
                    <span>実行中</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: linear-gradient(135deg, #89f7fe 0%, #66a6ff 100%);"></div>
                    <span>完了</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);"></div>
                    <span>クリティカルパス</span>
                </div>
            </div>
        </div>

        <div class="control-panel">
            <button class="control-button" onclick="startExecution()">実行開始</button>
            <button class="control-button" onclick="pauseExecution()">一時停止</button>
            <button class="control-button" onclick="resetExecution()">リセット</button>
            <button class="control-button" onclick="showCriticalPath()">クリティカルパス表示</button>

            <div class="status-indicator">
                <div class="status-dot active" id="statusDot"></div>
                <span id="statusText">準備完了</span>
            </div>
        </div>
    </div>

    <script>
        // WBSデータ（実際にはWBS_TEMPLATE.jsonから読み込み）
        const wbsData = {
            tasks: [
                { id: 'T001', name: '要件定義', dependencies: [], duration: 1, status: 'pending' },
                { id: 'T002', name: 'WBS作成', dependencies: ['T001'], duration: 0.5, status: 'pending' },
                { id: 'T003', name: 'アーキテクチャ設計', dependencies: ['T001'], duration: 2, status: 'pending' },
                { id: 'T004', name: 'テストコード作成', dependencies: ['T001', 'T003'], duration: 3, status: 'pending' },
                { id: 'T005', name: 'DB設計・実装', dependencies: ['T003'], duration: 3, status: 'pending' },
                { id: 'T006', name: 'バックエンドAPI', dependencies: ['T004', 'T005'], duration: 5, status: 'pending' },
                { id: 'T007', name: 'フロントエンド', dependencies: ['T004', 'T006'], duration: 5, status: 'pending' },
                { id: 'T008', name: '単体テスト', dependencies: ['T006', 'T007'], duration: 2, status: 'pending' },
                { id: 'T009', name: '統合テスト', dependencies: ['T008'], duration: 2, status: 'pending' },
                { id: 'T010', name: 'ドキュメント生成', dependencies: ['T006', 'T007'], duration: 1, status: 'pending' },
                { id: 'T011', name: '最終レビュー', dependencies: ['T009', 'T010'], duration: 1, status: 'pending' }
            ]
        };

        // ガントチャート描画
        function drawGanttChart() {
            const taskRows = document.getElementById('taskRows');
            taskRows.innerHTML = '';

            wbsData.tasks.forEach(task => {
                const row = document.createElement('div');
                row.className = 'task-row';

                const label = document.createElement('div');
                label.className = 'task-label';
                label.textContent = `${task.id}: ${task.name}`;

                const timeline = document.createElement('div');
                timeline.className = 'task-timeline';

                const bar = document.createElement('div');
                bar.className = `task-bar ${task.status}`;
                bar.style.width = `${task.duration * 50}px`;
                bar.style.left = `${getTaskStartPosition(task) * 50}px`;
                bar.textContent = `${task.duration}h`;

                timeline.appendChild(bar);
                row.appendChild(label);
                row.appendChild(timeline);
                taskRows.appendChild(row);
            });

            drawDependencies();
        }

        // タスク開始位置計算
        function getTaskStartPosition(task) {
            if (task.dependencies.length === 0) return 0;

            let maxEnd = 0;
            task.dependencies.forEach(depId => {
                const depTask = wbsData.tasks.find(t => t.id === depId);
                if (depTask) {
                    const depEnd = getTaskStartPosition(depTask) + depTask.duration;
                    maxEnd = Math.max(maxEnd, depEnd);
                }
            });

            return maxEnd;
        }

        // 依存関係線描画
        function drawDependencies() {
            // 簡略化のため省略
        }

        // 統計更新
        function updateStats() {
            const completed = wbsData.tasks.filter(t => t.status === 'completed').length;
            const running = wbsData.tasks.filter(t => t.status === 'running').length;
            const pending = wbsData.tasks.filter(t => t.status === 'pending').length;
            const total = wbsData.tasks.length;

            document.getElementById('completedCount').textContent = completed;
            document.getElementById('runningCount').textContent = running;
            document.getElementById('pendingCount').textContent = pending;
            document.getElementById('progressPercent').textContent = Math.round((completed / total) * 100) + '%';
        }

        // 実行シミュレーション
        function startExecution() {
            document.getElementById('statusText').textContent = '実行中';
            simulateExecution();
        }

        function simulateExecution() {
            // タスク実行シミュレーション
            let currentIndex = 0;
            const interval = setInterval(() => {
                if (currentIndex < wbsData.tasks.length) {
                    wbsData.tasks[currentIndex].status = 'running';
                    if (currentIndex > 0) {
                        wbsData.tasks[currentIndex - 1].status = 'completed';
                    }
                    drawGanttChart();
                    updateStats();
                    currentIndex++;
                } else {
                    wbsData.tasks[currentIndex - 1].status = 'completed';
                    drawGanttChart();
                    updateStats();
                    clearInterval(interval);
                    document.getElementById('statusText').textContent = '完了';
                }
            }, 1000);
        }

        function pauseExecution() {
            document.getElementById('statusText').textContent = '一時停止';
        }

        function resetExecution() {
            wbsData.tasks.forEach(task => task.status = 'pending');
            drawGanttChart();
            updateStats();
            document.getElementById('statusText').textContent = '準備完了';
        }

        function showCriticalPath() {
            // クリティカルパス表示
            alert('クリティカルパス: T001 → T003 → T004 → T006 → T007 → T008 → T009 → T011');
        }

        // 初期化
        drawGanttChart();
        updateStats();
    </script>
</body>
</html>
