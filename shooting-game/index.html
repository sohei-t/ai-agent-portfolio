<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; media-src 'self';">
  <title>Vertical Scrolling Shooter</title>
  <meta name="description" content="A browser-based vertical scrolling shooting game">
  <meta name="theme-color" content="#000000">
  <!-- favicon.svg は必要に応じて追加 -->
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      height: 100vh;
      background: linear-gradient(180deg, #000814 0%, #001d3d 100%);
      font-family: 'Courier New', monospace;
      color: #fff;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #game-container {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
      max-width: 100vw;
      max-height: 100vh;
      padding: 8px;
      touch-action: none;
    }

    #gameCanvas {
      border: 2px solid #00b4d8;
      box-shadow: 0 0 20px rgba(0, 180, 216, 0.5);
      background: #000;
      max-width: 100%;
      max-height: 100%;
    }

    #loading-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }

    #loading-screen.hidden {
      display: none;
    }

    .loading-text {
      font-size: 24px;
      margin-bottom: 20px;
      color: #00b4d8;
    }

    .loading-bar {
      width: 300px;
      height: 30px;
      border: 2px solid #00b4d8;
      background: #000;
      position: relative;
      overflow: hidden;
    }

    .loading-progress {
      height: 100%;
      background: linear-gradient(90deg, #00b4d8, #0096c7);
      width: 0%;
      transition: width 0.3s ease;
    }

    /* Mobile controls */
    #mobile-controls {
      display: none;
      position: absolute;
      bottom: 20px;
      width: 100%;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 10;
      pointer-events: none;
    }

    @media (max-width: 768px) {
      #mobile-controls {
        display: flex;
        padding: 0 12px;
      }
    }

    .virtual-dpad {
      width: 120px;
      height: 120px;
      background: rgba(0, 180, 216, 0.3);
      border: 2px solid #00b4d8;
      border-radius: 50%;
      position: relative;
      pointer-events: auto;
    }

    .shoot-button {
      width: 80px;
      height: 80px;
      background: rgba(255, 0, 0, 0.5);
      border: 2px solid #ff0000;
      border-radius: 50%;
      color: #fff;
      font-size: 18px;
      font-weight: bold;
      display: flex;
      justify-content: center;
      align-items: center;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      pointer-events: auto;
      border-radius: 14px;
      padding: 4px;
    }

    .shoot-button:active {
      background: rgba(255, 0, 0, 0.8);
    }

    .bomb {
      background: rgba(255, 140, 0, 0.5);
      border-color: #ff8c00;
    }

    .bomb:active {
      background: rgba(255, 140, 0, 0.85);
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <!-- Loading Screen -->
    <div id="loading-screen">
      <div class="loading-text">Loading...</div>
      <div class="loading-bar">
        <div class="loading-progress" id="loading-progress"></div>
      </div>
    </div>

    <!-- Mobile Controls -->
    <div id="mobile-controls">
      <div class="virtual-dpad" id="virtual-dpad"></div>
      <div style="display:flex; gap:12px; align-items:center; pointer-events:auto;">
        <div class="shoot-button" id="shoot-button">FIRE</div>
        <div class="shoot-button bomb" id="bomb-button">BOMB</div>
      </div>
    </div>
  </div>

  <!-- Game Entry Point -->
  <script type="module" src="./src/main.js"></script>
</body>
</html>
