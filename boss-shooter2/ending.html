<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Space Odyssey - Victory!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(180deg, #000033 0%, #000066 50%, #0000aa 100%);
            color: #fff;
            font-family: 'Orbitron', monospace;
            overflow: hidden;
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* 背景エフェクト */
        #stars {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* 花火エフェクト */
        .firework {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            animation: explode 3s ease-out forwards;
        }

        @keyframes explode {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                opacity: 0;
            }
        }

        /* メインコンテナ */
        .container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 20px;
        }

        /* 勝利画像セクション */
        .victory-images {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }

        .victory-image {
            position: absolute;
            opacity: 0;
            animation: fadeInOut 9s infinite;
        }

        #ending-victory {
            width: 100%;
            height: 100%;
            object-fit: cover;
            animation-delay: 0s;
        }

        #ending-earth {
            width: 300px;
            height: 300px;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            animation-delay: 3s;
        }

        #ending-heroes {
            width: 400px;
            height: 200px;
            bottom: 10%;
            right: 10%;
            animation-delay: 6s;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0; }
            10%, 30% { opacity: 0.7; }
        }

        /* タイトル */
        h1 {
            font-size: 5rem;
            font-weight: 900;
            text-align: center;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #ffff00, #00ffff, #ff00ff, #ffff00);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rainbow 3s linear infinite, scaleIn 1s ease-out;
            text-shadow: 0 0 50px rgba(255, 255, 0, 0.5);
        }

        @keyframes rainbow {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        @keyframes scaleIn {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        /* 祝福メッセージ */
        .congratulations {
            font-size: 2rem;
            color: #ffff00;
            margin-bottom: 30px;
            text-align: center;
            animation: bounce 1s ease-in-out infinite;
            text-shadow: 0 0 20px rgba(255, 255, 0, 0.8);
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* スコア表示 */
        .final-score {
            font-size: 3rem;
            color: #00ffff;
            margin: 20px 0;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% {
                text-shadow: 0 0 10px rgba(0, 255, 255, 0.8),
                           0 0 20px rgba(0, 255, 255, 0.6),
                           0 0 30px rgba(0, 255, 255, 0.4);
            }
            50% {
                text-shadow: 0 0 20px rgba(0, 255, 255, 1),
                           0 0 40px rgba(0, 255, 255, 0.8),
                           0 0 60px rgba(0, 255, 255, 0.6);
            }
        }

        /* ランク表示 */
        .rank {
            font-size: 4rem;
            font-weight: 900;
            margin: 20px 0;
            animation: rankAppear 2s ease-out;
        }

        .rank.S { color: #ffff00; text-shadow: 0 0 30px rgba(255, 255, 0, 0.8); }
        .rank.A { color: #ff9900; text-shadow: 0 0 30px rgba(255, 153, 0, 0.8); }
        .rank.B { color: #00ff00; text-shadow: 0 0 30px rgba(0, 255, 0, 0.8); }
        .rank.C { color: #00ffff; text-shadow: 0 0 30px rgba(0, 255, 255, 0.8); }

        @keyframes rankAppear {
            0% { transform: scale(10) rotate(360deg); opacity: 0; }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }

        /* ボス全員集合 */
        #bossGallery {
            width: 100%;
            max-width: 800px;
            margin: 20px 0;
            padding: 20px;
            background: rgba(0, 0, 0, 0.5);
            border: 3px solid #ffff00;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(255, 255, 0, 0.5);
        }

        .gallery-title {
            text-align: center;
            font-size: 1.5rem;
            color: #ffff00;
            margin-bottom: 20px;
        }

        .boss-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 10px;
        }

        .boss-item {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #00ffff;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            animation: bossAppear 0.5s ease-out forwards;
            opacity: 0;
            cursor: pointer;
            transition: all 0.3s;
        }

        .boss-item:hover {
            transform: scale(1.2) rotate(5deg);
            border-color: #ffff00;
            box-shadow: 0 0 20px rgba(255, 255, 0, 0.8);
        }

        .boss-item img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        @keyframes bossAppear {
            to {
                opacity: 1;
                transform: rotateY(360deg);
            }
        }

        /* 大型ボス表示オーバーレイ */
        #bossShowcase {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            background: radial-gradient(ellipse at center, rgba(0,0,50,0.95) 0%, rgba(0,0,0,0.98) 100%);
            /* アニメーションはJavaScriptから適用 */
        }

        @keyframes showcaseFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .showcase-content {
            text-align: center;
            animation: showcaseZoomIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes showcaseZoomIn {
            from { transform: scale(0.3) rotate(-10deg); opacity: 0; }
            to { transform: scale(1) rotate(0); opacity: 1; }
        }

        .showcase-boss-image {
            max-width: 60vmin;
            max-height: 50vmin;
            filter: drop-shadow(0 0 30px rgba(255, 255, 0, 0.8))
                    drop-shadow(0 0 60px rgba(255, 100, 0, 0.5));
            animation: showcasePulse 2s ease-in-out infinite, showcaseFloat 3s ease-in-out infinite;
        }

        @keyframes showcasePulse {
            0%, 100% { filter: drop-shadow(0 0 30px rgba(255, 255, 0, 0.8)) drop-shadow(0 0 60px rgba(255, 100, 0, 0.5)); }
            50% { filter: drop-shadow(0 0 50px rgba(255, 255, 0, 1)) drop-shadow(0 0 80px rgba(255, 100, 0, 0.8)); }
        }

        @keyframes showcaseFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .showcase-stage-label {
            font-size: 1.5rem;
            color: #ff6600;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 100, 0, 0.8);
            animation: labelGlow 1.5s ease-in-out infinite;
        }

        @keyframes labelGlow {
            0%, 100% { text-shadow: 0 0 20px rgba(255, 100, 0, 0.8); }
            50% { text-shadow: 0 0 40px rgba(255, 200, 0, 1); }
        }

        .showcase-boss-name {
            font-size: 2.5rem;
            font-weight: 900;
            margin-top: 20px;
            background: linear-gradient(45deg, #ff0000, #ffff00, #ff6600);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: nameRainbow 2s linear infinite;
            text-shadow: 0 0 30px rgba(255, 255, 0, 0.5);
        }

        @keyframes nameRainbow {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .showcase-defeated {
            font-size: 3rem;
            color: #ff0000;
            margin-top: 15px;
            animation: defeatedStamp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-shadow: 0 0 30px rgba(255, 0, 0, 0.8);
        }

        @keyframes defeatedStamp {
            from { transform: scale(3) rotate(20deg); opacity: 0; }
            to { transform: scale(1) rotate(-5deg); opacity: 1; }
        }

        .showcase-close-hint {
            position: absolute;
            bottom: 30px;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.5);
            animation: hintBlink 2s infinite;
        }

        @keyframes hintBlink {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* スパークエフェクト */
        .spark {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #ffff00;
            border-radius: 50%;
            pointer-events: none;
            animation: sparkFly 1s ease-out forwards;
        }

        @keyframes sparkFly {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        /* ボタン */
        .buttons {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s;
            font-family: 'Orbitron', monospace;
            animation: btnPulse 2s ease-in-out infinite;
        }

        .btn-primary {
            background: linear-gradient(45deg, #ffff00, #ff9900);
            color: #000;
            box-shadow: 0 0 20px rgba(255, 255, 0, 0.5);
        }

        .btn-secondary {
            background: linear-gradient(45deg, #00ffff, #0099ff);
            color: #fff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        .btn:hover {
            transform: scale(1.1) rotate(3deg);
            box-shadow: 0 0 40px currentColor;
        }

        @keyframes btnPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* レスポンシブ */
        @media (max-width: 768px) {
            h1 { font-size: 3rem; }
            .final-score { font-size: 2rem; }
            .rank { font-size: 3rem; }
            .btn { padding: 10px 25px; font-size: 1rem; }
        }
    </style>
</head>
<body>
    <canvas id="stars"></canvas>

    <!-- 勝利画像 -->
    <div class="victory-images">
        <img id="ending-victory" src="assets/images/ending_victory.png" alt="Victory" class="victory-image" onerror="this.style.display='none'">
        <img id="ending-earth" src="assets/images/ending_earth.png" alt="Earth" class="victory-image" onerror="this.style.display='none'">
        <img id="ending-heroes" src="assets/images/ending_heroes.png" alt="Heroes" class="victory-image" onerror="this.style.display='none'">
    </div>

    <!-- 大型ボス表示オーバーレイ -->
    <div id="bossShowcase">
        <div class="showcase-content">
            <div class="showcase-stage-label" id="showcaseStage">STAGE 1</div>
            <img class="showcase-boss-image" id="showcaseBossImage" src="" alt="Boss">
            <div class="showcase-boss-name" id="showcaseBossName">Boss Name</div>
            <div class="showcase-defeated">DEFEATED!</div>
        </div>
        <div class="showcase-close-hint">Click or tap to continue...</div>
    </div>

    <div class="container">
        <h1>VICTORY!</h1>
        <div class="congratulations">🎊 宇宙を救った英雄たちへ 🎊</div>

        <div class="final-score" id="finalScore">SCORE: 0</div>
        <div class="rank" id="rank">S</div>

        <div id="bossGallery">
            <div class="gallery-title">🏆 倒したボスたち 🏆</div>
            <div class="boss-grid" id="bossGrid"></div>
        </div>

        <div class="buttons">
            <button class="btn btn-primary" onclick="newGame()">NEW GAME+</button>
            <button class="btn btn-secondary" onclick="goToTitle()">TITLE</button>
            <button class="btn btn-secondary" id="bgmButton" onclick="manualStartBGM()" style="background: linear-gradient(45deg, #ff6600, #ffcc00);">🎵 BGM</button>
        </div>
    </div>

    <script>
        console.log('=== Victory BGM Script Loading ===');

        // ====================================
        // Web Audio API プロシージャルBGM生成
        // パッヘルベルのカノン風の勝利テーマ
        // ====================================
        class VictoryBGM {
            constructor() {
                this.audioContext = null;
                this.isPlaying = false;
                this.masterGain = null;
                this.currentChord = 0;
                this.tempo = 72; // BPM
                this.beatDuration = 60 / this.tempo;
                this.loopTimer = null;

                // パッヘルベルのカノン風コード進行（D major）
                this.chordProgression = [
                    { root: 293.66, notes: [293.66, 369.99, 440.00] },  // D major
                    { root: 220.00, notes: [220.00, 277.18, 329.63] },  // A major
                    { root: 246.94, notes: [246.94, 293.66, 369.99] },  // Bm
                    { root: 185.00, notes: [185.00, 220.00, 277.18] },  // F#m
                    { root: 196.00, notes: [196.00, 246.94, 293.66] },  // G major
                    { root: 293.66, notes: [293.66, 369.99, 440.00] },  // D major
                    { root: 196.00, notes: [196.00, 246.94, 293.66] },  // G major
                    { root: 220.00, notes: [220.00, 277.18, 329.63] },  // A major
                ];

                // メロディ（カノン風）
                this.melody = [
                    { note: 587.33, duration: 0.5 }, { note: 523.25, duration: 0.5 },
                    { note: 587.33, duration: 0.5 }, { note: 659.25, duration: 0.5 },
                    { note: 659.25, duration: 0.5 }, { note: 587.33, duration: 0.5 },
                    { note: 523.25, duration: 0.5 }, { note: 493.88, duration: 0.5 },
                    { note: 493.88, duration: 0.5 }, { note: 440.00, duration: 0.5 },
                    { note: 493.88, duration: 0.5 }, { note: 523.25, duration: 0.5 },
                    { note: 440.00, duration: 0.5 }, { note: 369.99, duration: 0.5 },
                    { note: 440.00, duration: 0.5 }, { note: 493.88, duration: 0.5 },
                    { note: 392.00, duration: 0.5 }, { note: 440.00, duration: 0.5 },
                    { note: 493.88, duration: 0.5 }, { note: 523.25, duration: 0.5 },
                    { note: 587.33, duration: 0.5 }, { note: 659.25, duration: 0.5 },
                    { note: 587.33, duration: 0.5 }, { note: 523.25, duration: 0.5 },
                    { note: 493.88, duration: 0.5 }, { note: 523.25, duration: 0.5 },
                    { note: 587.33, duration: 0.5 }, { note: 659.25, duration: 0.5 },
                    { note: 659.25, duration: 1.0 }, { note: 587.33, duration: 1.0 },
                ];
            }

            async init() {
                if (this.audioContext) {
                    console.log('AudioContext exists, state:', this.audioContext.state);
                    if (this.audioContext.state === 'suspended') {
                        try {
                            console.log('Attempting resume on existing context...');
                            const resumePromise = this.audioContext.resume();
                            await Promise.race([
                                resumePromise,
                                new Promise((_, reject) => setTimeout(() => reject('timeout'), 1000))
                            ]);
                            console.log('AudioContext resumed, new state:', this.audioContext.state);
                        } catch (e) {
                            console.error('Resume failed or timeout:', e);
                            // タイムアウトの場合、新しいコンテキストを作成
                            this.audioContext = null;
                            return this.init();
                        }
                    }
                    return this.audioContext.state === 'running';
                }

                try {
                    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                    console.log('Creating new AudioContext...');
                    this.audioContext = new AudioContextClass();
                    this.masterGain = this.audioContext.createGain();
                    this.masterGain.gain.value = 0.3;
                    this.masterGain.connect(this.audioContext.destination);
                    console.log('AudioContext created, state:', this.audioContext.state);

                    if (this.audioContext.state === 'suspended') {
                        console.log('Context suspended, attempting resume...');
                        try {
                            const resumePromise = this.audioContext.resume();
                            await Promise.race([
                                resumePromise,
                                new Promise((_, reject) => setTimeout(() => reject('timeout'), 1000))
                            ]);
                            console.log('Resume completed, state:', this.audioContext.state);
                        } catch (e) {
                            console.warn('Resume timeout/error, will retry on next gesture:', e);
                            return false;
                        }
                    }
                    return this.audioContext.state === 'running';
                } catch (e) {
                    console.error('AudioContext init failed:', e);
                    return false;
                }
            }

            // ストリングス風パッド音色
            createPadOscillator(frequency, startTime, duration) {
                try {
                    const osc1 = this.audioContext.createOscillator();
                    const osc2 = this.audioContext.createOscillator();
                    const gain = this.audioContext.createGain();
                    const filter = this.audioContext.createBiquadFilter();

                    osc1.type = 'sawtooth';
                    osc1.frequency.value = frequency;
                    osc2.type = 'sawtooth';
                    osc2.frequency.value = frequency * 1.003;

                    filter.type = 'lowpass';
                    filter.frequency.value = 800;
                    filter.Q.value = 1;

                    osc1.connect(filter);
                    osc2.connect(filter);
                    filter.connect(gain);
                    gain.connect(this.masterGain);

                    // 安全なエンベロープ（時間順序を保証）
                    const attackTime = Math.min(0.3, duration * 0.2);
                    const releaseTime = Math.min(0.3, duration * 0.2);

                    gain.gain.setValueAtTime(0, startTime);
                    gain.gain.linearRampToValueAtTime(0.12, startTime + attackTime);
                    gain.gain.linearRampToValueAtTime(0.12, startTime + duration - releaseTime);
                    gain.gain.linearRampToValueAtTime(0, startTime + duration);

                    osc1.start(startTime);
                    osc1.stop(startTime + duration);
                    osc2.start(startTime);
                    osc2.stop(startTime + duration);
                } catch (e) {
                    console.error('Pad error:', e);
                }
            }

            // ベース音
            createBass(frequency, startTime, duration) {
                try {
                    const osc = this.audioContext.createOscillator();
                    const gain = this.audioContext.createGain();
                    const filter = this.audioContext.createBiquadFilter();

                    osc.type = 'triangle';
                    osc.frequency.value = frequency / 2;

                    filter.type = 'lowpass';
                    filter.frequency.value = 300;

                    osc.connect(filter);
                    filter.connect(gain);
                    gain.connect(this.masterGain);

                    gain.gain.setValueAtTime(0, startTime);
                    gain.gain.linearRampToValueAtTime(0.15, startTime + 0.05);
                    gain.gain.linearRampToValueAtTime(0.1, startTime + duration * 0.8);
                    gain.gain.linearRampToValueAtTime(0, startTime + duration);

                    osc.start(startTime);
                    osc.stop(startTime + duration);
                } catch (e) {
                    console.error('Bass error:', e);
                }
            }

            // メロディ音（ブラス風）
            createMelody(frequency, startTime, duration) {
                try {
                    const osc1 = this.audioContext.createOscillator();
                    const osc2 = this.audioContext.createOscillator();
                    const gain = this.audioContext.createGain();
                    const filter = this.audioContext.createBiquadFilter();

                    osc1.type = 'square';
                    osc1.frequency.value = frequency;
                    osc2.type = 'sawtooth';
                    osc2.frequency.value = frequency;

                    filter.type = 'lowpass';
                    filter.frequency.value = 2000;
                    filter.Q.value = 2;

                    osc1.connect(filter);
                    osc2.connect(filter);
                    filter.connect(gain);
                    gain.connect(this.masterGain);

                    // 安全なエンベロープ
                    const attackTime = Math.min(0.05, duration * 0.1);
                    const decayTime = Math.min(0.05, duration * 0.1);
                    const releaseStart = Math.max(startTime + attackTime + decayTime, startTime + duration - 0.1);

                    gain.gain.setValueAtTime(0, startTime);
                    gain.gain.linearRampToValueAtTime(0.15, startTime + attackTime);
                    gain.gain.linearRampToValueAtTime(0.1, startTime + attackTime + decayTime);
                    gain.gain.setValueAtTime(0.1, releaseStart);
                    gain.gain.linearRampToValueAtTime(0, startTime + duration);

                    osc1.start(startTime);
                    osc1.stop(startTime + duration);
                    osc2.start(startTime);
                    osc2.stop(startTime + duration);
                } catch (e) {
                    console.error('Melody error:', e);
                }
            }

            playMeasure(chordIndex, startTime) {
                const chord = this.chordProgression[chordIndex];
                const measureDuration = this.beatDuration * 4;

                this.createBass(chord.root, startTime, measureDuration);
                chord.notes.forEach(note => {
                    this.createPadOscillator(note, startTime, measureDuration);
                });
            }

            playMelodyLine(startTime) {
                let time = startTime;
                this.melody.forEach(note => {
                    const duration = note.duration * this.beatDuration * 2;
                    this.createMelody(note.note, time, duration * 0.9);
                    time += duration;
                });
            }

            async play() {
                if (this.isPlaying) {
                    console.log('Already playing');
                    return;
                }

                if (!this.audioContext) {
                    console.log('No audio context, initializing...');
                    const ok = await this.init();
                    if (!ok) return;
                }

                if (this.audioContext.state === 'suspended') {
                    console.log('Context suspended, resuming...');
                    await this.audioContext.resume();
                }

                console.log('Starting playback, context state:', this.audioContext.state);
                this.isPlaying = true;

                const playSection = () => {
                    if (!this.isPlaying) return;

                    try {
                        const now = this.audioContext.currentTime;
                        const measureDuration = this.beatDuration * 4;

                        for (let i = 0; i < 8; i++) {
                            this.playMeasure(i, now + i * measureDuration);
                        }
                        this.playMelodyLine(now);

                        const totalDuration = measureDuration * 8;
                        this.loopTimer = setTimeout(() => playSection(), totalDuration * 1000 - 100);
                    } catch (e) {
                        console.error('Playback error:', e);
                    }
                };

                playSection();
            }

            stop() {
                this.isPlaying = false;
                if (this.loopTimer) {
                    clearTimeout(this.loopTimer);
                    this.loopTimer = null;
                }
            }
        }

        // BGMインスタンス
        const victoryBGM = new VictoryBGM();
        let bgmStarted = false;

        // BGM開始（複数回呼ばれても安全）
        async function startBGM() {
            if (bgmStarted && victoryBGM.isPlaying) {
                console.log('BGM already playing');
                return;
            }

            console.log('startBGM called');
            try {
                const initOk = await victoryBGM.init();
                console.log('init result:', initOk, 'context state:', victoryBGM.audioContext?.state);

                if (!initOk) {
                    console.log('Init failed, will retry on next gesture');
                    bgmStarted = false;
                    return;
                }

                bgmStarted = true;
                await victoryBGM.play();
                console.log('BGM started successfully, isPlaying:', victoryBGM.isPlaying);

                // ボタンの表示を更新
                const btn = document.getElementById('bgmButton');
                if (btn && victoryBGM.isPlaying) {
                    btn.textContent = '🔇 STOP';
                }
            } catch (e) {
                console.error('startBGM error:', e);
                bgmStarted = false;
            }
        }

        // ユーザー操作からのみBGM開始（Safariは直接操作が必須）
        function handleUserGesture(e) {
            console.log('User gesture detected:', e.type, 'target:', e.target?.tagName);
            if (!bgmStarted || !victoryBGM.isPlaying) {
                startBGM();
            }
        }

        // キャプチャフェーズで捕捉（他のハンドラより先に実行）
        ['click', 'touchend', 'touchstart'].forEach(eventType => {
            document.addEventListener(eventType, handleUserGesture, { capture: true, passive: true });
            window.addEventListener(eventType, handleUserGesture, { capture: true, passive: true });
        });

        // ページ読み込み完了後にも再設定
        window.addEventListener('DOMContentLoaded', () => {
            console.log('DOMContentLoaded - adding body click handler');
            document.body.addEventListener('click', handleUserGesture, { capture: true });
            document.body.addEventListener('touchend', handleUserGesture, { capture: true });
        });

        // 即時実行でもbodyにハンドラ追加（DOMContentLoadedが既に終わっている場合）
        if (document.body) {
            console.log('Adding immediate body handlers');
            document.body.onclick = function(e) {
                console.log('body.onclick fired');
                handleUserGesture(e);
            };
        }

        // 手動BGM開始ボタン用
        async function manualStartBGM() {
            console.log('Manual BGM button clicked');
            const btn = document.getElementById('bgmButton');

            if (victoryBGM.isPlaying) {
                // 停止
                victoryBGM.stop();
                if (btn) btn.textContent = '🎵 BGM';
                bgmStarted = false;
                console.log('BGM stopped');
            } else {
                // 開始
                bgmStarted = false; // リセットして開始
                await startBGM();
                if (btn && victoryBGM.isPlaying) {
                    btn.textContent = '🔇 STOP';
                }
            }
        }

        console.log('=== Victory BGM Script Loaded ===');
    </script>

    <script>
        // スコアとランク表示
        const finalScore = localStorage.getItem('finalScore') || 999999;
        const stagesCleared = localStorage.getItem('stagesCleared') || 11;

        // スコアアニメーション
        let currentScore = 0;
        const targetScore = parseInt(finalScore);
        const scoreElement = document.getElementById('finalScore');
        const scoreInterval = setInterval(() => {
            currentScore += Math.ceil((targetScore - currentScore) / 10);
            scoreElement.textContent = `SCORE: ${currentScore.toLocaleString()}`;
            if (currentScore >= targetScore) {
                clearInterval(scoreInterval);
                scoreElement.textContent = `SCORE: ${targetScore.toLocaleString()}`;
            }
        }, 50);

        // ランク判定
        function calculateRank(score) {
            if (score >= 1000000) return 'S';
            if (score >= 500000) return 'A';
            if (score >= 200000) return 'B';
            return 'C';
        }

        const rank = calculateRank(targetScore);
        const rankElement = document.getElementById('rank');
        rankElement.textContent = `RANK: ${rank}`;
        rankElement.className = `rank ${rank}`;

        // ボスギャラリー表示（1体ずつドラマチックに登場）
        const bossGrid = document.getElementById('bossGrid');
        const totalBosses = 11; // boss_01.PNG から boss_11.PNG まで
        const bossNames = [
            'STAGE 1: Cyber Guardian',
            'STAGE 2: Plasma Serpent',
            'STAGE 3: Iron Golem',
            'STAGE 4: Storm Bringer',
            'STAGE 5: Shadow Lord',
            'STAGE 6: Flame Emperor',
            'STAGE 7: Frost Queen',
            'STAGE 8: Thunder God',
            'STAGE 9: Void Walker',
            'STAGE 10: Final Dimension',
            'TRUE FINAL: Omega Destroyer'
        ];

        // ボス登場音を再生する関数
        function playBossAppearSound() {
            const audio = new Audio();
            audio.src = 'assets/audio/sfx/sfx_enemy_destroy.wav';
            audio.volume = 0.3;
            audio.play().catch(() => {});
        }

        // ボスを1体ずつ表示
        let currentBossIndex = 0;
        const bossInterval = 800; // 0.8秒間隔

        function showNextBoss() {
            if (currentBossIndex >= totalBosses) {
                // 全ボス表示完了後の演出
                setTimeout(() => {
                    const galleryTitle = document.querySelector('.gallery-title');
                    if (galleryTitle) {
                        galleryTitle.innerHTML = '🏆 ALL BOSSES DEFEATED! 🏆<br><small style="font-size:0.8rem;color:#00ffff;">Click a boss to view details</small>';
                        galleryTitle.style.animation = 'rainbow 2s linear infinite, pulse 1s infinite';
                    }
                    // クリックイベントを更新
                    updateBossClickEvents();

                    // 2秒後に自動スライドショー開始
                    setTimeout(() => {
                        startBossSlideshow();
                    }, 2000);
                }, 500);
                return;
            }

            const i = currentBossIndex + 1;
            const bossItem = document.createElement('div');
            bossItem.className = 'boss-item';
            bossItem.style.opacity = '0';
            bossItem.style.transform = 'scale(0) rotate(180deg)';

            const img = document.createElement('img');
            img.src = `assets/images/boss_${String(i).padStart(2, '0')}.PNG`;
            img.alt = bossNames[currentBossIndex];
            img.onerror = function() {
                this.src = `assets/images/bosses/boss_${String(i).padStart(2, '0')}.svg`;
            };

            bossItem.appendChild(img);
            bossItem.title = bossNames[currentBossIndex];

            // クリックで再アニメーション
            bossItem.onclick = () => {
                bossItem.style.animation = 'none';
                setTimeout(() => {
                    bossItem.style.animation = 'bossAppear 0.5s ease-out forwards, bounce 0.5s ease-out';
                }, 10);
            };

            bossGrid.appendChild(bossItem);

            // 登場アニメーション
            setTimeout(() => {
                playBossAppearSound();
                bossItem.style.transition = 'all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55)';
                bossItem.style.opacity = '1';
                bossItem.style.transform = 'scale(1) rotate(0deg)';

                // ゴールド枠エフェクト
                bossItem.style.boxShadow = '0 0 20px rgba(255, 255, 0, 0.8)';
                setTimeout(() => {
                    bossItem.style.boxShadow = '';
                }, 300);
            }, 50);

            currentBossIndex++;
            setTimeout(showNextBoss, bossInterval);
        }

        // 2秒後からボス表示開始
        setTimeout(showNextBoss, 2000);

        // 大型ボス表示機能
        const bossShowcase = document.getElementById('bossShowcase');
        const showcaseStage = document.getElementById('showcaseStage');
        const showcaseBossImage = document.getElementById('showcaseBossImage');
        const showcaseBossName = document.getElementById('showcaseBossName');
        let showcaseAutoTimer = null;
        let showcaseCurrentIndex = 0;
        let showcaseMode = false;

        // スパークエフェクトを生成
        function createSparks(x, y, count = 20) {
            for (let i = 0; i < count; i++) {
                const spark = document.createElement('div');
                spark.className = 'spark';
                spark.style.left = x + 'px';
                spark.style.top = y + 'px';

                const angle = (Math.PI * 2 / count) * i;
                const distance = 50 + Math.random() * 100;
                spark.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
                spark.style.setProperty('--ty', Math.sin(angle) * distance + 'px');
                spark.style.background = ['#ffff00', '#ff6600', '#ff0000', '#ffffff'][Math.floor(Math.random() * 4)];

                document.body.appendChild(spark);
                setTimeout(() => spark.remove(), 1000);
            }
        }

        // ボスを大きく表示
        function showBossShowcase(bossIndex) {
            console.log('Showing boss showcase for index:', bossIndex);

            if (bossIndex < 0 || bossIndex >= totalBosses) {
                console.warn('Invalid boss index:', bossIndex);
                return;
            }

            showcaseCurrentIndex = bossIndex;
            const stageNum = bossIndex + 1;

            // ステージラベルを設定
            if (showcaseStage) {
                showcaseStage.textContent = stageNum === 11 ? 'TRUE FINAL' : `STAGE ${stageNum}`;
            }

            // ボス画像を設定
            if (showcaseBossImage) {
                showcaseBossImage.src = `assets/images/boss_${String(stageNum).padStart(2, '0')}.PNG`;
                showcaseBossImage.onerror = function() {
                    this.src = `assets/images/bosses/boss_${String(stageNum).padStart(2, '0')}.svg`;
                };
            }

            // ボス名を設定
            if (showcaseBossName && bossNames[bossIndex]) {
                showcaseBossName.textContent = bossNames[bossIndex];
            }

            // ショーケースを表示してアニメーション
            if (bossShowcase) {
                bossShowcase.style.display = 'flex';
                bossShowcase.style.opacity = '1';

                // アニメーションをリセット
                bossShowcase.style.animation = 'none';
                void bossShowcase.offsetWidth; // reflow
                bossShowcase.style.animation = 'showcaseFadeIn 0.5s ease-out forwards';
            }

            const content = bossShowcase ? bossShowcase.querySelector('.showcase-content') : null;
            if (content) {
                content.style.animation = 'none';
                void content.offsetWidth;
                content.style.animation = 'showcaseZoomIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards';
            }

            const defeated = bossShowcase ? bossShowcase.querySelector('.showcase-defeated') : null;
            if (defeated) {
                defeated.style.animation = 'none';
                void defeated.offsetWidth;
                setTimeout(() => {
                    defeated.style.animation = 'defeatedStamp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards';
                }, 500);
            }

            // スパークエフェクト
            setTimeout(() => {
                createSparks(window.innerWidth / 2, window.innerHeight / 2, 30);
            }, 300);

            // 効果音
            try {
                const audio = new Audio('assets/audio/sfx/sfx_enemy_destroy.wav');
                audio.volume = 0.5;
                audio.play().catch(() => {});
            } catch(e) {
                console.log('Audio play failed:', e);
            }

            showcaseMode = true;
        }

        // ショーケースを閉じる
        function closeShowcase() {
            bossShowcase.style.display = 'none';
            showcaseMode = false;

            // 自動スライドショーの場合は次へ
            if (showcaseAutoTimer) {
                clearTimeout(showcaseAutoTimer);
                showcaseAutoTimer = null;
            }
        }

        // 次のボスを表示（自動スライドショー用）
        function showNextShowcase() {
            console.log('showNextShowcase called, current index:', showcaseCurrentIndex);
            if (showcaseCurrentIndex < totalBosses - 1) {
                const nextIndex = showcaseCurrentIndex + 1;
                console.log('Showing next boss at index:', nextIndex);
                showBossShowcase(nextIndex);
                showcaseAutoTimer = setTimeout(showNextShowcase, 4000);
            } else {
                console.log('Slideshow complete, closing showcase');
                closeShowcase();
            }
        }

        // クリックでショーケースを閉じて次へ進む（自動スライドショー中の場合）
        if (bossShowcase) {
            bossShowcase.addEventListener('click', (e) => {
                e.stopPropagation();
                if (showcaseAutoTimer) {
                    // 自動スライドショー中：次のボスへ進む
                    clearTimeout(showcaseAutoTimer);
                    showNextShowcase();
                } else {
                    // 手動表示中：閉じる
                    closeShowcase();
                }
            });
        }

        // 全ボス表示完了後に自動スライドショー開始
        function startBossSlideshow() {
            console.log('Starting boss slideshow');
            showcaseCurrentIndex = -1;
            showNextShowcase();
        }

        // ボスグリッドのクリックイベント更新（個別ボス表示）
        function updateBossClickEvents() {
            const bossItems = document.querySelectorAll('.boss-item');
            bossItems.forEach((item, index) => {
                item.onclick = () => {
                    showBossShowcase(index);
                };
            });
        }

        // 星空背景
        const canvas = document.getElementById('stars');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const stars = [];
        for (let i = 0; i < 200; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 2,
                alpha: Math.random(),
                speed: Math.random() * 0.5
            });
        }

        function drawStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            stars.forEach(star => {
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${star.alpha})`;
                ctx.fill();

                star.alpha += Math.random() * 0.02 - 0.01;
                if (star.alpha < 0.3) star.alpha = 0.3;
                if (star.alpha > 1) star.alpha = 1;

                star.y += star.speed;
                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }
            });

            requestAnimationFrame(drawStars);
        }
        drawStars();

        // 花火エフェクト
        function createFirework() {
            const x = Math.random() * window.innerWidth;
            const y = Math.random() * window.innerHeight * 0.5;
            const colors = ['#ffff00', '#ff00ff', '#00ffff', '#ff9900', '#00ff00'];

            for (let i = 0; i < 30; i++) {
                const firework = document.createElement('div');
                firework.className = 'firework';
                firework.style.left = x + 'px';
                firework.style.top = y + 'px';
                firework.style.background = colors[Math.floor(Math.random() * colors.length)];

                const angle = (Math.PI * 2 / 30) * i;
                const velocity = 100 + Math.random() * 100;
                const vx = Math.cos(angle) * velocity;
                const vy = Math.sin(angle) * velocity;

                firework.style.animation = `explode 3s ease-out forwards`;
                firework.style.transform = `translate(${vx}px, ${vy}px)`;

                document.body.appendChild(firework);

                setTimeout(() => firework.remove(), 3000);
            }
        }

        // 定期的に花火を打ち上げ
        setInterval(createFirework, 1500);
        createFirework(); // 初回即実行

        // ボタン機能
        function newGame() {
            localStorage.setItem('newGamePlus', 'true');
            localStorage.setItem('playerLives', '5');
            window.location.href = 'index.html';
        }

        function goToTitle() {
            window.location.href = 'index.html';
        }

    </script>
</body>
</html>
