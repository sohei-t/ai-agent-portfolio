server:
  port: 3456
  host: "127.0.0.1"

watch:
  directories:
    - "~/Desktop/AI-Apps"
    - "~/Desktop/Learning-Curricula"
  stability_threshold_ms: 300
  poll_interval_ms: 100

sse:
  heartbeat_interval_ms: 30000
  max_clients: 100

store:
  data_dir: "./data"
  debounce_ms: 100

agents:
  git-worktree-agent:
    label: "Web App Development"
    color: "#3B82F6"
    icon: "code-2"
  learning-content-agent:
    label: "Learning Content (Gemini)"
    color: "#10B981"
    icon: "book-open"
  learning-content-agent-gcp:
    label: "Learning Content (GCP)"
    color: "#F59E0B"
    icon: "cloud"
  skill-publish-agent:
    label: "Skill Publishing"
    color: "#8B5CF6"
    icon: "rocket"
  video-generator-agent:
    label: "Video Generation"
    color: "#EF4444"
    icon: "video"
