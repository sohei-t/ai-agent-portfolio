<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio要素テスト（互換性重視）</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            color: white;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
        }
        button {
            display: block;
            width: 100%;
            padding: 25px;
            font-size: 18px;
            margin: 15px 0;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        .method1 { background: #4CAF50; color: white; }
        .method2 { background: #2196F3; color: white; }
        .method3 { background: #FF9800; color: white; }
        button:active { opacity: 0.8; }
        .info {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
        }
        audio {
            width: 100%;
            margin: 10px 0;
        }
        .log {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            font-family: monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Audio要素テスト</h1>

        <div class="info">
            <strong>📱 このページは3つの方法で音声をテストします：</strong>
            <ol>
                <li>Web Audio API（オシレーター）</li>
                <li>Audio要素（Base64データ）</li>
                <li>HTMLのaudioタグ（直接制御）</li>
            </ol>
        </div>

        <button class="method1" onclick="method1()">方法1: Web Audio API</button>
        <button class="method2" onclick="method2()">方法2: Audio要素 (Base64)</button>
        <button class="method3" onclick="method3()">方法3: HTML Audioタグ</button>

        <h3>方法3用のコントロール:</h3>
        <audio id="testAudio" controls>
            Your browser does not support the audio element.
        </audio>

        <div class="info">
            <strong>デバイス情報:</strong>
            <div id="deviceInfo"></div>
        </div>

        <div class="log" id="log"></div>
    </div>

    <script>
        // ログ表示関数
        function log(msg) {
            const logEl = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            logEl.innerHTML = `[${time}] ${msg}<br>` + logEl.innerHTML;
        }

        // デバイス情報表示
        document.getElementById('deviceInfo').innerHTML = `
            UA: ${navigator.userAgent.substring(0, 50)}...<br>
            Platform: ${navigator.platform}<br>
            Touch: ${navigator.maxTouchPoints} points
        `;

        // 方法1: Web Audio API
        function method1() {
            log('方法1: Web Audio API を試行中...');
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const audioContext = new AudioContext();

                if (audioContext.state === 'suspended') {
                    audioContext.resume().then(() => {
                        log('AudioContext resumed');
                        playOscillator(audioContext);
                    });
                } else {
                    playOscillator(audioContext);
                }
            } catch (error) {
                log('エラー: ' + error.message);
            }
        }

        function playOscillator(audioContext) {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            oscillator.frequency.value = 440;
            gainNode.gain.value = 0.3;
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            oscillator.start();
            oscillator.stop(audioContext.currentTime + 0.5);
            log('✅ オシレーター音を再生 (440Hz)');
        }

        // 方法2: Audio要素 with Base64
        function method2() {
            log('方法2: Audio要素 (Base64) を試行中...');
            try {
                // 短いビープ音のBase64エンコード（WAVファイル）
                const audioData = 'data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhCC+Gy/PWhzMGHGS48OyuVRUIQ5zd88aAMgYhdM/z1IY2CBdjuOy9fScBLobP8+GXRwYUX7Pi6a1dFwdFmdvw0YU3Bygpws/x3pFABxdjsvPtqVwXBlOh3uzQfC4FMYfU8seBMwUvh9j1x3w1Bixqvu7dkz0JFE6h0+/bkEkHEVCZ1/PYizsIGmy56+ykWBUKTqbh8cN4KAYuh8j01IIxBSp3v/Lnm00HEle86e2jVRsJRJ3Y9L+BLwUuhsjz05ExBSl4yO3mmU0HEle26e2kVBwJRJ3Z9L+BLwUuhsjz05ExBSl4yO3mmU0HEle26e2kVBwJRJ3Z9L+BLwUuhsjz05ExBSl4yO3mmU0HEle26e2kVBwJRJ3Z9L+BLwUuhsjz05ExBSl4yO3mmU0HEle26e2kVRsJRJ3Z9L+BLwUuhsjz05ExBSl4yO3mmU0HEle26e2kVBwJRJ3Z9L+BLwUuhsjz05ExBSl4yO3mmU0HEle26e2kVBwJRJ3Z9L+BLwUuhsjz05ExBSp4yO3mmU0HEle26e2kVBwJRJ3Z9L+BLwUuhsjz05ExBSp4yO3mmU0HEle26e2kVBwJRJ3Z9L+BLwUthsjz05ExBSp4yO3mmU0HEle26e2kVBwJRJ3Z9L+BLwUthsjz05ExBSp4yO3mmU0HEle26e2kVBwJRJ3Z9L+BLwUthsjz05ExBSp4yO3mmU0HEle26e2kVBwJRJ3Z9L+BLwUthsjz05ExBSp4yO3mmU0HEle26e2kVBwJRJ3Z9L+CLgUthsjz05IxBSp4yO3mmU0HEle26e2kVBwJRJ3Z9L+CLgUthsjz05IxBSp4yO3mmU0HEle26e2kVRsJRJ3Z9L+CLgUthsjz05IxBSp4yO3mmU0HEle26e2kVRsJRJ3Z9L+CLgUthsjz05IxBSp4yO3mmU0HEle26e2kVRsJRJ3Z9L+CLgUthsjz05IxBSp4yO3mmU0HEle26e2kVRsJRJ3Z9L+CLgUthsjz05IxBSp4yO3mmU0HEle26e2kVRsJRJ3Z9L+CLgUthsjz05IxBSp4yO3mmU0HEle26e2kVRsJRJ3Z9L+CLgUthsjz05IxBSp4yO3mmU0HEle26e2kVB0JRJ3Z9L+CLgUthsjz05IxBSp4yO3mmU0HEle26e2kVB0JRJ3Z9L+CLgUthsjz05IxBSp4yO3mmU0HEVe26e2kVB0JRJ3Z9L+CLgUthsjz05IxBSp4yO3mmE4HEVe26e2kVB0JRJ3Z9L+CLgU=';
                const audio = new Audio(audioData);
                audio.volume = 0.5;

                // プレイ試行
                const playPromise = audio.play();

                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        log('✅ Base64音声を再生成功');
                    }).catch(error => {
                        log('❌ 再生エラー: ' + error.message);
                    });
                }
            } catch (error) {
                log('エラー: ' + error.message);
            }
        }

        // 方法3: 動的にAudioを生成
        function method3() {
            log('方法3: HTML Audioタグを試行中...');
            try {
                const audioElement = document.getElementById('testAudio');

                // WAVファイルを動的に生成
                const sampleRate = 44100;
                const duration = 0.5;
                const frequency = 440;
                const samples = sampleRate * duration;

                // WAVヘッダーとデータを作成
                const buffer = new ArrayBuffer(44 + samples * 2);
                const view = new DataView(buffer);

                // WAVヘッダー
                const writeString = (offset, string) => {
                    for (let i = 0; i < string.length; i++) {
                        view.setUint8(offset + i, string.charCodeAt(i));
                    }
                };

                writeString(0, 'RIFF');
                view.setUint32(4, 36 + samples * 2, true);
                writeString(8, 'WAVE');
                writeString(12, 'fmt ');
                view.setUint32(16, 16, true);
                view.setUint16(20, 1, true);
                view.setUint16(22, 1, true);
                view.setUint32(24, sampleRate, true);
                view.setUint32(28, sampleRate * 2, true);
                view.setUint16(32, 2, true);
                view.setUint16(34, 16, true);
                writeString(36, 'data');
                view.setUint32(40, samples * 2, true);

                // 音声データ（サイン波）
                for (let i = 0; i < samples; i++) {
                    const t = i / sampleRate;
                    const value = Math.sin(2 * Math.PI * frequency * t) * 0.3;
                    const sample = Math.max(-1, Math.min(1, value)) * 32767;
                    view.setInt16(44 + i * 2, sample, true);
                }

                // Blob作成
                const blob = new Blob([buffer], { type: 'audio/wav' });
                const url = URL.createObjectURL(blob);

                audioElement.src = url;
                audioElement.volume = 0.5;
                audioElement.play().then(() => {
                    log('✅ WAV音声を再生成功');
                }).catch(error => {
                    log('❌ 再生エラー: ' + error.message);
                    log('手動で再生ボタンを押してみてください');
                });
            } catch (error) {
                log('エラー: ' + error.message);
            }
        }

        // 初期メッセージ
        log('テストページ準備完了');
    </script>
</body>
</html>
